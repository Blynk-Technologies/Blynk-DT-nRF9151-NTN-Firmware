# External flash (w25q128jv on SPI3)
CONFIG_SPI=y
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_SFDP_RUNTIME=y
CONFIG_PM_OVERRIDE_EXTERNAL_DRIVER_CHECK=y

# Sensor subsystem required for npm1300 charger driver
CONFIG_SENSOR=y

# Power module (npm1300 PMIC)
CONFIG_APP_POWER=y
CONFIG_NRF_FUEL_GAUGE=y
CONFIG_NPM13XX_CHARGER=y

# LED module (via npm1300)
CONFIG_APP_LED=y

# Environmental: Feather has STS4X (temperature only), not BME680.
# APP_ENVIRONMENTAL depends on BME680 so it cannot be enabled here.
# CONFIG_APP_ENVIRONMENTAL is not set

# Location priority order (GNSS first for NTN)
CONFIG_LOCATION_REQUEST_DEFAULT_METHOD_FIRST_GNSS=y
CONFIG_LOCATION_REQUEST_DEFAULT_METHOD_SECOND_CELLULAR=y
