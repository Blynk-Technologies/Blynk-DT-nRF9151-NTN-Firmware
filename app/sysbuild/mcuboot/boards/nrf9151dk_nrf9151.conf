# MCUboot config to enable secondary slot on the external flash

CONFIG_FLASH=y
CONFIG_SPI=y
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
CONFIG_SPI_NOR_SFDP_DEVICETREE=y

CONFIG_PM_PARTITION_SIZE_MCUBOOT=0x13E00
CONFIG_PM_OVERRIDE_EXTERNAL_DRIVER_CHECK=y

CONFIG_MULTITHREADING=y
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_BOOT_MAX_IMG_SECTORS=256

# Required by the RedteaMobile nuSIM module (modules/lib/redteamobile-nusim)
# when CONFIG_LIB_NUSIM=y: its sysbuild post_cmake hook hard-fails the build
# otherwise. Placed here (board-specific, all nrf9151dk builds) rather than
# behind -Dmcuboot_EXTRA_CONF_FILE, which did not reliably persist through
# the nRF Connect for VS Code build-configuration UI.
#
# NOTE: this changes the mcuboot signature scheme to ECDSA P256 for EVERY
# nrf9151dk build, not just nuSIM ones. If this board already has RSA-signed
# images in the field expecting FOTA updates, this is a breaking, one-way
# change for that fleet -- confirm that's acceptable before shipping a build
# with this to real devices.
CONFIG_BOOT_FIH_PROFILE_MEDIUM=y
CONFIG_BOOT_SIGNATURE_TYPE_ECDSA_P256=y
CONFIG_BOOT_SIGNATURE_TYPE_RSA=n
CONFIG_MCUBOOT_DOWNGRADE_PREVENTION=y
