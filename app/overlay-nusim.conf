# Enables the RedteaMobile nuSIM (integrated software SIM) library from
# modules/lib/redteamobile-nusim. Opt-in, matching the other overlay-*.conf
# files in this directory: pass it via EXTRA_CONF_FILE, e.g.
#
#   west build -b nrf9151dk/nrf9151/ns --sysbuild -p -- \
#     -DEXTRA_CONF_FILE="overlay-nusim.conf;overlay-ntn-skylo-dt.conf"
#
# The mcuboot-side settings this module's build requires (ECDSA P256
# signing, FIH, downgrade prevention) now live directly in
# sysbuild/mcuboot/boards/nrf9151dk_nrf9151.conf instead of a separate
# -Dmcuboot_EXTRA_CONF_FILE argument -- that CMake argument did not reliably
# persist through the nRF Connect for VS Code build-configuration UI.
#
# The module itself needs to be visible to CMake too: either fetched via
# west (see the redteamobile-nusim entry in west.yml, currently unused by
# this shared-SDK VS Code build flow), or via the ZEPHYR_EXTRA_MODULES guard
# in app/CMakeLists.txt that picks up a manual clone at C:/Norodic/ncs-nusim-app
# if present.
#
# This board also needs a locked app/pm_static_<board>.yml before this is
# ever flashed to a device with real nuSIM provisioning data -- see the
# firmware developer guide (Safety and Flashing Rules) for why, and build
# once WITHOUT a pm_static file first to capture the generated
# build/partitions.yml before creating one.

# Core nuSIM library. Requires CONFIG_NRF_MODEM_LIB (already set in
# prj.conf) and CONFIG_BUILD_WITH_TFM (implied by the _ns board variant).
CONFIG_LIB_NUSIM=y
CONFIG_TFM_CONNECTION_BASED_SERVICE_API=y

# TF-M's own bootloader (BL2) must stay disabled: this project already boots
# through sysbuild MCUboot, and running both would be redundant/conflicting.
CONFIG_TFM_BL2=n
CONFIG_TFM_PROFILE_TYPE_NOT_SET=y

# NOTE: this project already sets CONFIG_TFM_LOG_LEVEL_SILENCE=n,
# CONFIG_TFM_SPM_LOG_LEVEL_DEBUG=y and CONFIG_TFM_EXCEPTION_INFO_DUMP=y in
# app/prj.conf for TF-M UART debug logging. The nuSIM module's own sample
# overlay sets the opposite (SILENCE=y, EXCEPTION_INFO_DUMP=n) purely to
# save flash. Deliberately NOT overridden here -- your existing TF-M
# logging setup wins. Revisit if flash gets tight.

# These generic TF-M service partitions are disabled to save flash, per the
# nuSIM module's own sample. This project uses CONFIG_MODEM_ATTEST_TOKEN and
# CONFIG_NRF_CLOUD_CREDENTIALS_MGMT_MODEM, which go through the modem's own
# secure storage (%CMNG / modem attestation), not these TF-M partitions --
# but verify nRF Cloud provisioning still works end-to-end after enabling
# nuSIM, since this hasn't been confirmed against this app's exact feature
# set.
CONFIG_TFM_PARTITION_PROTECTED_STORAGE=n
CONFIG_TFM_PARTITION_INITIAL_ATTESTATION=n
CONFIG_TFM_PARTITION_FIRMWARE_UPDATE=n

CONFIG_ASSERT=y

# Encrypt TF-M Internal Trusted Storage (where nuSIM credentials live) and
# size it for the nuSIM asset count/size, per the module's own sample.
CONFIG_TFM_ITS_ENCRYPTED=y
CONFIG_PM_PARTITION_SIZE_TFM_INTERNAL_TRUSTED_STORAGE=0x6000
# The module sample's default of 0x10000 (64KB) overflowed TF-M's secure RAM
# by ~1KB once linked with the nuSIM secure partition + rtxuicc lib in this
# app (measured: 66500 B used vs 65536 B region). Bumped with some headroom;
# this is taken out of the same physical SRAM the non-secure app image uses,
# so if the app image's own RAM overflows next, this is the first place to
# reconsider trimming back.
CONFIG_PM_PARTITION_SIZE_TFM_SRAM=0x12000
CONFIG_TFM_ITS_NUM_ASSETS_OVERRIDE=y
CONFIG_TFM_ITS_NUM_ASSETS=40
CONFIG_TFM_ITS_MAX_ASSET_SIZE_OVERRIDE=y
CONFIG_TFM_ITS_MAX_ASSET_SIZE=512

# Deliberately NOT set here: CONFIG_PM_PARTITION_SIZE_TFM (the flash-size
# override for the "tfm" partition). Its correct value depends on the size
# of the built TF-M secure image with nuSIM linked in, which depends on
# board/app config. Build once first WITHOUT a pm_static.yml so the
# partition manager auto-sizes it dynamically, read the resulting size out
# of build/partitions.yml, and only set/lock it once you write the static
# partition file. Setting a guessed value here risks either a build failure
# (too small) or silently wasting flash (too large).

# nRF Security / PSA crypto backing the nuSIM library's cryptographic
# operations.
CONFIG_NRF_SECURITY=y
CONFIG_MBEDTLS_PSA_CRYPTO_C=y

CONFIG_PSA_WANT_ALG_ECDH=y
CONFIG_PSA_WANT_ALG_ECDSA=y
CONFIG_PSA_WANT_ECC_BRAINPOOL_P_R1_256=y

CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_GENERATE=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_IMPORT=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_EXPORT=y

CONFIG_PSA_WANT_GENERATE_RANDOM=y

CONFIG_PSA_WANT_KEY_TYPE_AES=y
CONFIG_PSA_WANT_ALG_CBC_NO_PADDING=y

CONFIG_PSA_CRYPTO_DRIVER_CC3XX=y
